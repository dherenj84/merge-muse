name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "**/*.txt"
      - ".gitignore"
      - ".editorconfig"
      - "LICENSE"
      - "LICENSE.*"
      - ".env.example"
      - ".mergemuse.example.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build
