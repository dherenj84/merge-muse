services:
  merge-muse:
    build:
      context: .
      dockerfile: Dockerfile
    image: merge-muse:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
